<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles & Notes | Haktan Yılmaz</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Fira Code', monospace;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Üst Menü (Header) */
        header {
            padding: 20px 40px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 1.1rem;
            transition: opacity 0.3s ease;
        }
        header a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Ana Taşıyıcı */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sol Menü (Sidebar) */
        .sidebar {
            width: 300px;
            background-color: #161b22;
            border-right: 1px solid #30363d;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar h3 {
            color: #8b949e;
            font-size: 1rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .folder-title {
            color: #58a6ff;
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 0.95rem;
            text-transform: capitalize;
        }
        .file-link {
            display: block;
            color: #c9d1d9;
            text-decoration: none;
            padding: 5px 0 5px 15px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .file-link:hover {
            color: #58a6ff;
        }
        .file-link::before {
            content: "📄 ";
            font-size: 0.8rem;
        }

        /* Sağ İçerik Alanı (Makale) */
        .content-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: #0d1117;
        }
        .content-area h1, .content-area h2, .content-area h3 {
            color: #58a6ff;
            margin-bottom: 15px;
            margin-top: 25px;
        }
        .content-area p {
            margin-bottom: 15px;
        }
        .content-area ul, .content-area ol {
            margin-bottom: 15px;
            padding-left: 20px;
        }
        .content-area pre {
            background-color: #161b22 !important;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .content-area code {
            font-family: 'Fira Code', monospace;
        }
        
        /* Mobil Uyumluluk */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 200px;
                border-right: none;
                border-bottom: 1px solid #30363d;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html">cd ~/home</a>
        <span style="color: #8b949e;">./articles_and_notes.sh</span>
    </header>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <h3>Directory</h3>
            <div id="menu-container">
                <p style="color: #8b949e; font-size: 0.9rem;">Fetching repositories...</p>
            </div>
        </div>

        <div class="content-area" id="content-area">
            <h1>Welcome to the Terminal 🚀</h1>
            <p style="color: #8b949e;">Select an article from the left directory to start reading.</p>
        </div>
    </div>

    <script>
        // GitHub Repo Ayarları
        const REPO_NAME = 'haktanylmz/notlarim'; // Makalelerinin olduğu GitHub reposu
        const BRANCH = 'main';

        const menuContainer = document.getElementById('menu-container');
        const contentArea = document.getElementById('content-area');

        // 1. Klasörleri ve Dosyaları Çekme
        async function loadGitHubMenu() {
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_NAME}/contents`);
                
                if (!response.ok) throw new Error('Repo bulunamadı veya boş.');
                
                const data = await response.json();
                menuContainer.innerHTML = ''; // Yükleniyor yazısını sil

                const folders = data.filter(item => item.type === 'dir');

                if (folders.length === 0) {
                    menuContainer.innerHTML = '<p style="color: #ff7b72;">No directories found.</p>';
                    return;
                }

                for (const folder of folders) {
                    // Klasör Başlığı
                    const folderDiv = document.createElement('div');
                    folderDiv.className = 'folder-title';
                    folderDiv.innerText = '📁 ' + folder.name.replace(/-/g, ' ');
                    menuContainer.appendChild(folderDiv);

                    // İçindeki dosyaları çek
                    const filesResponse = await fetch(folder.url);
                    const filesData = await filesResponse.json();

                    const mdFiles = filesData.filter(file => file.name.endsWith('.md'));

                    mdFiles.forEach(file => {
                        const fileLink = document.createElement('a');
                        fileLink.className = 'file-link';
                        fileLink.innerText = file.name.replace('.md', '').replace(/-/g, ' ');
                        fileLink.onclick = () => loadMarkdownContent(file.path);
                        menuContainer.appendChild(fileLink);
                    });
                }
            } catch (error) {
                menuContainer.innerHTML = `<p style="color: #ff7b72;">Error: ${error.message}</p>`;
            }
        }

        // 2. Makale İçeriğini Çekme ve Render Etme
        async function loadMarkdownContent(filePath) {
            contentArea.innerHTML = '<p style="color: #8b949e;">Loading data packets...</p>';
            
            try {
                const rawUrl = `https://raw.githubusercontent.com/${REPO_NAME}/${BRANCH}/${filePath}`;
                const response = await fetch(rawUrl);
                
                if (!response.ok) throw new Error('Dosya okunamadı.');

                const markdownText = await response.text();

                // Markdown'ı HTML'e çevir
                contentArea.innerHTML = marked.parse(markdownText);
                
                // Prism.js ile kodları renklendir
                Prism.highlightAll();
                
            } catch (error) {
                contentArea.innerHTML = `<p style="color: #ff7b72;">Error: ${error.message}</p>`;
            }
        }

        // Sayfa açıldığında menüyü yükle
        window.onload = loadGitHubMenu;
    </script>
</body>
</html>
